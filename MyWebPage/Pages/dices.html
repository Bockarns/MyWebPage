<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="../CSS/nav.css" />
    <link rel="stylesheet" href="dices.css" />
    <title>Pig Game</title>
  </head>
  <body>
    <header class="header">
      <nav class="main-nav">
        <input type="checkbox" name="menu-toggle" id="menu-toggle" />
        <label for="menu-toggle" class="hamburger-menu">
          <span class="bar top"></span>
          <span class="bar middle"></span>
          <span class="bar bottom"></span>
        </label>
        <ul class="menu">
          <li class="logo-holder"></li>
          <li class="hidden-menu-choice"><a href="#top">Start</a></li>
          <li><a href="#jag">Profile</a></li>
          <li>
            <a href="#skill">Experience</a>
          </li>
          <li><a href="#contact">Contact me</a></li>
          <li>
            <a href="./cvNewEng.html">CV / Resume</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="player player--0 player--active">
        <h2 class="name" id="name--0">Player 1</h2>
        <p class="score" id="score--0">43</p>
        <div class="current">
          <p class="current-label">Current</p>
          <p class="current-score" id="current--0">0</p>
        </div>
      </section>
      <section class="player player--1">
        <h2 class="name" id="name--1">Player 2</h2>
        <p class="score" id="score--1">24</p>
        <div class="current">
          <p class="current-label">Current</p>
          <p class="current-score" id="current--1">0</p>
        </div>
      </section>

      <img src="/images/dices-img/dice-5.png" alt="Playing dice" class="dice" />
      <button class="btn btn--new">🔄 New game</button>
      <button class="btn btn--roll">🎲 Roll dice</button>
      <button class="btn btn--hold">📥 Hold</button>
    </main>
    <script src="dices.js"></script>
  </body>
</html>
